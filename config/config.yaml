# ─────────────────────────────────────────────
#  RAG Chatbot – Central Configuration
# ─────────────────────────────────────────────

# MongoDB (local)
mongodb:
  uri: "mongodb://localhost:27017"
  db_name: "support_rag"
  collections:
    rag_chunks: "rag_chunks"       # from rag_chunks.jsonl
    faq_chunks: "faq_chunks"       # from faq_chunks.jsonl
    embeddings: "chunk_embeddings" # unified collection with vectors

# Embedding Model
embedding:
  model_name: "BAAI/bge-base-en-v1.5"
  dimension: 768                   # BGE-base output size
  batch_size: 16                   # chunks per batch during embedding
  max_seq_length: 512              # max tokens the model accepts
  # BGE models need a query prefix for retrieval tasks
  query_prefix: "Represent this sentence for searching relevant passages: "
  passage_prefix: ""               # passages are embedded as-is

# Data paths (relative to project root)
data:
  rag_chunks_path: "data/preprocessed/rag_chunks.jsonl"
  faq_chunks_path: "data/preprocessed/faq_chunks.jsonl"

# Vector Search
search:
  top_k: 5                         # default number of results to retrieve
  min_score: 0.5                   # minimum cosine similarity threshold

# Optimization
optimization:
  # Hybrid retrieval
  top_k_candidates: 20           # candidates retrieved before reranking
  rrf_k: 60                      # RRF smoothing constant
  # Reranker
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k_final: 5                 # final chunks after reranking
  # Query expansion
  short_query_threshold: 8       # token count below which expansion fires
  expansion_max_tokens: 80

# Evaluation
evaluation:
  n_samples: 50
  k_values: [1, 3, 5]
  use_bertscore: true
  results_dir: "reports"

# Ollama / Generation
generation:
  model: "mistral"
  ollama_url: "http://localhost:11434/api/generate"
  temperature: 0.1
  max_tokens: 300

# Logging
logging:
  level: "INFO"
  log_file: "logs/vector_store.log"